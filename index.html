<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueShop</title>
    <style>
        /* Сжатые стили (полная функциональность) */
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',sans-serif;background:#0b0b0e;color:#e0e0e0;min-height:100vh;display:flex;justify-content:center;padding:20px;background-image:radial-gradient(circle at 20% 50%,#1a1a2e 0%,#0b0b0e 80%)}
        .container{max-width:1300px;width:100%;background:rgba(20,20,30,.85);backdrop-filter:blur(12px);border-radius:32px;padding:24px 28px;box-shadow:0 25px 60px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04)}
        .header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:15px;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.06)}
        .logo{font-size:32px;font-weight:800;background:linear-gradient(135deg,#00d4ff,#7b2ffc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px;text-shadow:0 0 30px rgba(0,212,255,.15)}
        .logo span{background:none;-webkit-text-fill-color:#fff}
        .nav{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
        .nav a{color:#aaa;text-decoration:none;font-weight:500;font-size:14px;padding:8px 16px;border-radius:40px;transition:.25s;background:transparent;display:flex;align-items:center;gap:6px;letter-spacing:.3px;cursor:pointer}
        .nav a:hover{color:#fff;background:rgba(0,212,255,.08);transform:translateY(-2px)}
        .nav .user-info{color:#888;font-size:14px;margin-left:6px;display:flex;align-items:center;gap:10px}
        .nav .user-info b{color:#00d4ff}
        .avatar-mini{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid #00d4ff;cursor:pointer;transition:.2s;background:#2a2a3a;display:flex;align-items:center;justify-content:center;font-size:16px;color:#aaa}
        .avatar-mini:hover{transform:scale(1.08)}
        .online-indicator{display:inline-flex;align-items:center;gap:6px;margin-right:12px;font-weight:600;font-size:14px;color:#aaa}
        .online-dot{width:14px;height:14px;border-radius:50%;display:inline-block;transition:background .3s,box-shadow .3s}
        .online-dot.online{background:#4caf50;box-shadow:0 0 12px rgba(76,175,80,.6);animation:pulse-green 2s infinite}
        .online-dot.offline{background:#f44336;box-shadow:0 0 12px rgba(244,67,54,.6);animation:pulse-red 2s infinite}
        .online-counter{display:inline-flex;align-items:center;gap:4px;font-size:14px;color:#aaa;margin-right:12px}
        .online-counter .count{color:#00d4ff;font-weight:700}
        @keyframes pulse-green{0%{box-shadow:0 0 0 0 rgba(76,175,80,.7)}70%{box-shadow:0 0 0 10px rgba(76,175,80,0)}100%{box-shadow:0 0 0 0 rgba(76,175,80,0)}}
        @keyframes pulse-red{0%{box-shadow:0 0 0 0 rgba(244,67,54,.7)}70%{box-shadow:0 0 0 10px rgba(244,67,54,0)}100%{box-shadow:0 0 0 0 rgba(244,67,54,0)}}
        .fade-in{animation:fadeIn .4s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
        .search-bar{display:flex;align-items:center;background:#1a1a24;border-radius:60px;padding:4px 4px 4px 20px;border:1px solid #2a2a3a;transition:.3s;margin-bottom:12px;flex-wrap:wrap;gap:6px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
        .search-bar:focus-within{border-color:#00d4ff;box-shadow:0 0 30px rgba(0,212,255,.15),0 2px 20px rgba(0,0,0,.5);transform:scale(1.01)}
        .search-bar input{flex:1;background:transparent;border:none;color:#fff;padding:14px 8px;font-size:16px;outline:none;min-width:120px}
        .search-bar input::placeholder{color:#666}
        .search-bar .search-icon{font-size:22px;color:#666;margin-right:6px;transition:.3s}
        .search-bar:focus-within .search-icon{color:#00d4ff}
        .search-bar .btn-search{background:linear-gradient(135deg,#00d4ff,#7b2ffc);border:none;border-radius:40px;padding:12px 28px;color:#fff;font-weight:600;cursor:pointer;transition:.3s;box-shadow:0 0 15px rgba(0,212,255,.2)}
        .search-bar .btn-search:hover{transform:scale(1.04);box-shadow:0 0 30px rgba(0,212,255,.4)}
        .genre-chips{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 16px}
        .genre-chip{padding:6px 18px;border-radius:40px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;border:2px solid transparent;background:#1e1e2e;color:#aaa;letter-spacing:.3px}
        .genre-chip:hover{transform:scale(1.04)}
        .genre-chip.active{border-color:#fff}
        .genre-chip.услуги{background:#0d47a1;color:#90caf9}
        .genre-chip.услуги.active{background:#1565c0;color:#fff;box-shadow:0 0 20px rgba(21,101,192,.4)}
        .genre-chip.порошки{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3)}
        .genre-chip.порошки.active{background:linear-gradient(135deg,#f093fb,#f5576c);box-shadow:0 0 30px rgba(245,87,108,.6);border-color:#fff}
        .genre-chip.рецепты{background:#1b5e20;color:#a5d6a7}
        .genre-chip.рецепты.active{background:#2e7d32;color:#fff;box-shadow:0 0 20px rgba(46,125,50,.4)}
        .genre-chip.скрипты{background:#4a148c;color:#ce93d8}
        .genre-chip.скрипты.active{background:#6a1b9a;color:#fff;box-shadow:0 0 20px rgba(106,27,154,.4)}
        .genre-chip.оружие{background:#2e7d32;color:#a5d6a7}
        .genre-chip.оружие.active{background:#388e3c;color:#fff;box-shadow:0 0 20px rgba(56,142,60,.4)}
        .genre-chip.вирусы{background:#4a148c;color:#ce93d8}
        .genre-chip.вирусы.active{background:#6a1b9a;color:#fff;box-shadow:0 0 20px rgba(106,27,154,.4)}
        .genre-chip.all{background:#333;color:#ccc}
        .genre-chip.all.active{background:#555;color:#fff;border-color:#00d4ff}
        .genre-tag{display:inline-block;padding:2px 12px;border-radius:40px;font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:lowercase}
        .genre-tag.услуги{background:#0d47a1;color:#90caf9}
        .genre-tag.порошки{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2)}
        .genre-tag.рецепты{background:#1b5e20;color:#a5d6a7}
        .genre-tag.скрипты{background:#4a148c;color:#ce93d8}
        .genre-tag.оружие{background:#2e7d32;color:#a5d6a7}
        .genre-tag.вирусы{background:#4a148c;color:#ce93d8}
        .section-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;margin:16px 0 20px}
        .section-header h2{font-size:24px;font-weight:600;border-left:4px solid #00d4ff;padding-left:14px;margin:0;color:#fff;letter-spacing:-.3px}
        .section-header .count{color:#888;font-size:14px}
        .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:25px;margin-top:10px}
        .product-card{background:#181825;border-radius:24px;padding:18px;cursor:default;transition:.35s cubic-bezier(.25,.46,.45,.94);border:1px solid #2a2a3a;display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
        .product-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 30%,rgba(0,212,255,.05),transparent 70%);opacity:0;transition:.5s;pointer-events:none}
        .product-card:hover::before{opacity:1}
        .product-card:hover{transform:translateY(-8px) scale(1.01);border-color:#00d4ff;box-shadow:0 16px 60px rgba(0,212,255,.12)}
        .product-card img{width:100%;height:160px;object-fit:contain;background:#0a0a12;border-radius:16px;margin-bottom:12px;transition:.3s}
        .product-card:hover img{transform:scale(1.02)}
        .product-card h3{font-size:18px;margin-bottom:4px;color:#fff;font-weight:600;line-height:1.3}
        .product-card .price{color:#4caf50;font-weight:700;font-size:19px}
        .product-card .meta{color:#888;font-size:13px;margin:4px 0}
        .product-card .genres{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0}
        .btn{display:inline-block;background:linear-gradient(135deg,#00d4ff,#7b2ffc);color:#fff;border:none;padding:8px 20px;border-radius:40px;font-weight:600;cursor:pointer;transition:.2s;font-size:14px;text-align:center;border:1px solid transparent}
        .btn:hover{transform:scale(1.04);box-shadow:0 0 25px rgba(0,212,255,.3)}
        .btn-danger{background:#d32f2f}
        .btn-danger:hover{background:#b71c1c}
        .btn-success{background:#2e7d32}
        .btn-success:hover{background:#1b5e20}
        .btn-secondary{background:#2a2a3a}
        .btn-secondary:hover{background:#3a3a4a}
        .btn-warning{background:#f9a825;color:#000}
        .btn-warning:hover{background:#f57f17}
        .btn-outline{background:transparent;border:1px solid #00d4ff;color:#00d4ff}
        .btn-outline:hover{background:#00d4ff;color:#fff}
        .btn-reset{background:#ff6f00;color:#fff}
        .btn-reset:hover{background:#e65100}
        .badge-own{display:inline-block;background:#ff6f00;color:#fff;padding:4px 12px;border-radius:40px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
        .auth-block{background:#151520;padding:32px;border-radius:28px;flex:1;min-width:280px;border:1px solid #2a2a3a;transition:.3s;box-shadow:0 8px 30px rgba(0,0,0,.4)}
        .auth-block:hover{border-color:#00d4ff}
        .auth-block h3{font-size:26px;margin-bottom:24px;color:#fff;font-weight:600}
        .auth-block .form-group{position:relative}
        .auth-block .form-group label{display:block;margin-bottom:6px;color:#aaa;font-weight:500}
        .auth-block .form-group input{width:100%;padding:14px 16px 14px 44px;background:#0e0e18;border:1px solid #2a2a3a;color:#fff;border-radius:16px;font-size:15px;transition:.3s}
        .auth-block .form-group input:focus{border-color:#00d4ff;outline:none;box-shadow:0 0 0 3px rgba(0,212,255,.1)}
        .auth-block .form-group .input-icon{position:absolute;left:16px;top:44px;font-size:20px;color:#666;transition:.3s}
        .auth-block .form-group input:focus+.input-icon,.auth-block .form-group input:focus~.input-icon{color:#00d4ff}
        .auth-block .btn{width:100%;padding:14px;font-size:16px;margin-top:8px}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;margin-bottom:6px;color:#ccc;font-weight:500;font-size:14px}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 16px;background:#0e0e18;border:1px solid #2a2a3a;color:#fff;border-radius:14px;font-size:15px;transition:.2s}
        .form-group input:focus,.form-group textarea:focus{border-color:#00d4ff;outline:none;box-shadow:0 0 0 3px rgba(0,212,255,.1)}
        .form-group input[type=file]{background:transparent;border:none;padding:0}
        .form-group .genre-checkboxes{display:flex;flex-wrap:wrap;gap:12px;margin-top:6px}
        .form-group .genre-checkboxes label{display:inline-flex;align-items:center;gap:6px;color:#ccc;font-weight:400;cursor:pointer}
        .form-group .genre-checkboxes input[type=checkbox]{width:auto;margin-right:4px}
        .cart-table{width:100%;border-collapse:collapse;margin-top:15px;background:#0e0e18;border-radius:16px;overflow:hidden}
        .cart-table th,.cart-table td{border:1px solid #2a2a3a;padding:14px;text-align:left}
        .cart-table th{background:#181825;color:#aaa;font-weight:600}
        .total{font-size:1.3em;font-weight:700;color:#fff;margin-top:15px}
        .order-card{background:#151520;border:1px solid #2a2a3a;border-radius:18px;padding:18px;margin:12px 0;transition:.2s}
        .order-card:hover{border-color:#00d4ff}
        .order-card .status{font-weight:600}
        .status-pending{color:#90caf9}
        .status-shipped{color:#ffe082}
        .status-completed{color:#81c784}
        .status-cancelled{color:#ef9a9a}
        .profile-avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid #00d4ff;background:#0e0e18;box-shadow:0 0 40px rgba(0,212,255,.15)}
        .profile-header{display:flex;gap:30px;align-items:center;flex-wrap:wrap;margin-bottom:30px;background:#151520;padding:24px;border-radius:24px;border:1px solid #2a2a3a}
        .profile-info .username{font-size:30px;font-weight:700;color:#fff}
        .profile-info .email{color:#888}
        .profile-info .password{color:#aaa}
        .chat-container{max-width:800px;margin:0 auto}
        .chat-messages{background:#0e0e18;border-radius:20px;padding:18px;max-height:400px;overflow-y:auto;margin-bottom:16px;border:1px solid #2a2a3a}
        .chat-message{padding:10px 16px;margin:6px 0;border-radius:18px;background:#1e1e2e;color:#e0e0e0;max-width:80%;word-wrap:break-word}
        .chat-message.system{background:#0d47a1;color:#90caf9;text-align:center;max-width:100%;margin:8px 0;border-radius:40px}
        .chat-message.self{background:linear-gradient(135deg,#00d4ff,#7b2ffc);color:#fff;align-self:flex-end;margin-left:auto}
        .chat-message .sender{font-weight:600;color:#00d4ff}
        .chat-message .time{font-size:11px;color:#888;margin-left:12px}
        .chat-input{display:flex;gap:12px}
        .chat-input input{flex:1;padding:14px 20px;background:#0e0e18;border:1px solid #2a2a3a;color:#fff;border-radius:60px;font-size:14px}
        .chat-input input:focus{border-color:#00d4ff;outline:none}
        .chat-input button{padding:14px 28px}
        .rules-container{max-width:700px;margin:0 auto;text-align:center}
        .rules-container h1{font-size:32px;margin-bottom:20px}
        .rules-container .rule-item{background:#151520;padding:24px;border-radius:20px;border:1px solid #2a2a3a;margin-bottom:20px;font-size:22px;font-weight:500;color:#fff}
        .rules-container img{max-width:100%;border-radius:20px;border:1px solid #2a2a3a;margin-top:20px}
        .add-product-form{background:#151520;padding:30px;border-radius:24px;border:1px solid #2a2a3a;max-width:700px;margin:0 auto}
        .add-product-form .btn{padding:12px 30px;font-size:16px}
        .game-hub{max-width:1000px;margin:0 auto}
        .game-hub h2{font-size:28px;text-align:center;margin-bottom:30px;color:#fff}
        .game-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px}
        .game-card{background:#181825;border-radius:28px;padding:30px 20px;text-align:center;cursor:pointer;transition:.3s;border:1px solid #2a2a3a;box-shadow:0 4px 20px rgba(0,0,0,.3)}
        .game-card:hover{transform:translateY(-10px) scale(1.02);border-color:#00d4ff;box-shadow:0 16px 60px rgba(0,212,255,.12)}
        .game-card .icon{font-size:60px;margin-bottom:15px;display:block}
        .game-card h3{font-size:22px;color:#fff;margin-bottom:8px}
        .game-card p{color:#888;font-size:14px}
        .game-container{max-width:500px;margin:0 auto;text-align:center;background:#151520;padding:30px;border-radius:28px;border:1px solid #2a2a3a;box-shadow:0 8px 30px rgba(0,0,0,.4)}
        .game-container h2{font-size:28px;margin-bottom:20px;color:#fff}
        .game-mode-selector{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
        .game-mode-selector button{padding:8px 24px;border-radius:40px;background:#2a2a3a;color:#aaa;border:2px solid transparent;cursor:pointer;transition:.2s;font-weight:600}
        .game-mode-selector button.active{border-color:#00d4ff;background:#1a1a2a;color:#fff;box-shadow:0 0 20px rgba(0,212,255,.2)}
        .game-mode-selector button:hover{transform:scale(1.05)}
        .game-board{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:340px;margin:20px auto}
        .game-cell{aspect-ratio:1;background:#0e0e18;border-radius:16px;border:2px solid #2a2a3a;font-size:48px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;color:#fff;text-shadow:0 0 20px rgba(0,212,255,.3)}
        .game-cell:hover:not(.taken){background:#1a1a2a;border-color:#00d4ff;transform:scale(1.04)}
        .game-cell.taken{cursor:default;opacity:.9}
        .game-cell.x{color:#00d4ff}
        .game-cell.o{color:#f5576c}
        .game-status{font-size:20px;font-weight:600;margin:15px 0;color:#aaa}
        .game-score{display:flex;justify-content:center;gap:30px;margin:15px 0;font-size:18px;color:#888}
        .game-score .x-score{color:#00d4ff}
        .game-score .o-score{color:#f5576c}
        .game-score .draw-score{color:#f9a825}
        .minesweeper-container{max-width:500px;margin:0 auto;text-align:center}
        .minesweeper-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;padding:10px 20px;background:#151520;border-radius:16px;border:1px solid #2a2a3a}
        .minesweeper-header span{font-size:20px;font-weight:600}
        .minesweeper-board{display:grid;gap:4px;margin:0 auto;justify-content:center}
        .minesweeper-cell{aspect-ratio:1;background:#1e1e2e;border-radius:6px;border:1px solid #2a2a3a;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;color:#fff}
        .minesweeper-cell:hover:not(.revealed){background:#2a2a3a;transform:scale(1.04)}
        .minesweeper-cell.revealed{background:#0e0e18;cursor:default;border-color:#1a1a2a}
        .minesweeper-cell.flagged{background:#0d47a1;color:#90caf9}
        .minesweeper-cell.mine-exploded{background:#d32f2f;color:#fff}
        .minesweeper-cell[data-value="1"]{color:#4caf50}
        .minesweeper-cell[data-value="2"]{color:#f9a825}
        .minesweeper-cell[data-value="3"]{color:#f44336}
        .minesweeper-cell[data-value="4"]{color:#7b1fa2}
        .minesweeper-cell[data-value="5"]{color:#f06292}
        .minesweeper-cell[data-value="6"]{color:#00bcd4}
        .minesweeper-cell[data-value="7"]{color:#fff}
        .minesweeper-cell[data-value="8"]{color:#78909c}
        .village-container{max-width:1000px;margin:0 auto;display:flex;flex-wrap:wrap;gap:30px;justify-content:center}
        .village-resources{background:#151520;border-radius:20px;padding:20px;border:1px solid #2a2a3a;flex:1 1 280px}
        .village-resources h3{margin-bottom:15px;color:#fff;font-size:20px;border-bottom:1px solid #2a2a3a;padding-bottom:10px}
        .village-resources .res-item{display:flex;justify-content:space-between;padding:4px 0;font-size:15px}
        .village-resources .res-item span:first-child{color:#aaa}
        .village-resources .res-item span:last-child{font-weight:600;color:#fff}
        .village-buildings{flex:2 1 500px;background:#151520;border-radius:20px;padding:20px;border:1px solid #2a2a3a;max-height:600px;overflow-y:auto}
        .village-buildings h3{margin-bottom:15px;color:#fff;font-size:20px;border-bottom:1px solid #2a2a3a;padding-bottom:10px}
        .building-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #2a2a3a}
        .building-item:last-child{border-bottom:none}
        .building-item .info{color:#ccc;font-size:14px}
        .building-item .info strong{color:#fff}
        .building-item .btn{padding:4px 12px;font-size:13px}
        .village-status{margin-top:15px;font-size:15px;color:#888}
        .village-achievements{margin-top:15px;background:#1a1a2a;border-radius:12px;padding:12px;border:1px solid #2a2a3a}
        .village-achievements h4{color:#00d4ff;margin-bottom:8px}
        .village-achievements .ach-item{display:inline-block;background:#2a2a3a;padding:2px 10px;border-radius:20px;margin:3px;font-size:13px;color:#aaa}
        .village-achievements .ach-item.unlocked{color:#4caf50;background:#1b5e20}
        .ai-container{max-width:800px;margin:0 auto}
        .ai-settings{background:#151520;padding:20px;border-radius:20px;border:1px solid #2a2a3a;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:15px;align-items:flex-end}
        .ai-settings .form-group{flex:1;min-width:150px;margin-bottom:0}
        .ai-settings .form-group label{color:#aaa;font-size:13px}
        .ai-settings .form-group input,.ai-settings .form-group select{width:100%;padding:8px 12px;background:#0e0e18;border:1px solid #2a2a3a;color:#fff;border-radius:10px}
        .ai-chat{background:#151520;border-radius:20px;border:1px solid #2a2a3a;padding:20px;height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
        .ai-chat .msg{padding:10px 16px;border-radius:18px;max-width:80%;word-wrap:break-word}
        .ai-chat .msg.user{background:#00d4ff;color:#fff;align-self:flex-end}
        .ai-chat .msg.assistant{background:#2a2a3a;color:#e0e0e0;align-self:flex-start}
        .ai-chat .msg.system-msg{background:#0d47a1;color:#90caf9;text-align:center;max-width:100%;margin:8px 0;border-radius:40px}
        .ai-input{display:flex;gap:12px;margin-top:15px}
        .ai-input input{flex:1;padding:12px 20px;background:#0e0e18;border:1px solid #2a2a3a;color:#fff;border-radius:60px;font-size:14px}

<body>
<div class="container" id="app">
    <div class="header">
        <div class="logo">True<span>Shop</span></div>
        <div class="nav">
            <span class="online-indicator" title="Статус соединения"><span class="online-dot online" id="onlineDot"></span><span id="onlineText" style="font-size:13px;">Онлайн</span></span>
            <span class="online-counter" id="onlineCounter"><span class="count" id="onlineCount">0</span> 👤</span>
            <a onclick="showPage('catalog')"><i>🏠</i> Каталог</a>
            <a onclick="showPage('cart')"><i>🛒</i> Корзина (<span id="cartCount">0</span>)</a>
            <a onclick="showPage('myOrders')"><i>📦</i> Заказы</a>
            <a onclick="showPage('chats')"><i>💬</i> Чаты</a>
            <a onclick="showPage('globalChat')"><i>🌐</i> Общий чат</a>
            <a onclick="showPage('rules')"><i>📋</i> Правила</a>
            <a onclick="showPage('game')"><i>🎮</i> Игры</a>
            <a onclick="showPage('ai')"><i>🤖</i> AI</a>
            <span class="user-info" id="userInfo"></span>
        </div>
    </div>
    <div id="pageContent" class="fade-in"></div>
</div>

<script>
// ================================================================
// НАСТРОЙКИ JSONBIN (ЗАМЕНИТЕ)
// ================================================================
const BIN_ID = 'YOUR_BIN_ID';
const API_KEY = 'YOUR_API_KEY';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const HEADERS = { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY };

// ================================================================
// ДАННЫЕ
// ================================================================
let data = { users: [], products: [], orders: [], chat: [], online: [] };
let currentUserId = null;
const GENRES = ['услуги','порошки','рецепты','скрипты','оружие','вирусы'];
const GENRE_EMOJI = { услуги:'🛠', порошки:'🧪', рецепты:'📜', скрипты:'💻', оружие:'🔫', вирусы:'🦠' };
let searchQuery = '', selectedGenre = 'all';

// ================================================================
// РАБОТА С JSONBIN
// ================================================================
async function loadData() {
    try {
        const res = await fetch(BIN_URL, { headers: HEADERS });
        if (!res.ok) throw new Error('Ошибка загрузки данных');
        const json = await res.json();
        data = json.record || { users: [], products: [], orders: [], chat: [], online: [] };
        if (!data.users) data.users = [];
        if (!data.products) data.products = [];
        if (!data.orders) data.orders = [];
        if (!data.chat) data.chat = [];
        if (!data.online) data.online = [];
        if (data.users.length === 0) {
            data.users.push({ id: 1, username: 'Admin', email: 'admin@trueshop.com', password: 'admin123', avatar: '', cardNumber: '1234 5678 9012 3456', banned: false });
            await saveData();
        }
        await updateOnlineList();
    } catch (e) {
        console.error('loadData error', e);
        alert('Не удалось загрузить данные. Проверьте интернет и настройки JSONBin.');
    }
}

async function saveData() {
    try {
        const res = await fetch(BIN_URL, {
            method: 'PUT',
            headers: HEADERS,
            body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error('Ошибка сохранения');
    } catch (e) {
        console.error('saveData error', e);
        alert('Не удалось сохранить данные.');
    }
}

// ================================================================
// ОНЛАЙН-СЧЁТЧИК
// ================================================================
async function updateOnlineList() {
    const user = getCurrentUser();
    if (user) {
        const now = Date.now();
        const existing = data.online.find(o => o.userId === user.id);
        if (existing) existing.lastSeen = now;
        else data.online.push({ userId: user.id, username: user.username, lastSeen: now });
        data.online = data.online.filter(o => Date.now() - o.lastSeen < 30000);
        await saveData();
    }
    document.getElementById('onlineCount').textContent = data.online.length;
}
setInterval(async () => {
    await loadData();
    await updateOnlineList();
}, 10000);

// ================================================================
// ПОЛЬЗОВАТЕЛИ
// ================================================================
function getCurrentUser() { return data.users.find(u => u.id === currentUserId) || null; }
function getUserById(id) { return data.users.find(u => u.id === id) || null; }
function isBanned(id) { const u = getUserById(id); return u ? u.banned : false; }

async function loginUser(login, password) {
    const user = data.users.find(u =>
        (u.username.toLowerCase() === login.toLowerCase() ||
         u.email.toLowerCase() === login.toLowerCase()) &&
        u.password === password &&
        !u.banned
    );
    if (user) {
        currentUserId = user.id;
        sessionStorage.setItem('currentUserId', currentUserId);
        updateUserInfo();
        await updateOnlineList();
        showPage('catalog');
        return true;
    }
    return false;
}

async function registerUser(username, email, password, avatar) {
    if (data.users.some(u => u.username.toLowerCase() === username.toLowerCase())) {
        alert('Этот ник уже занят!'); return false;
    }
    if (data.users.some(u => u.email.toLowerCase() === email.toLowerCase())) {
        alert('Email уже зарегистрирован'); return false;
    }
    const newUser = {
        id: data.users.length ? Math.max(...data.users.map(u => u.id)) + 1 : 1,
        username, email, password, avatar: avatar || '', cardNumber: '', banned: false
    };
    data.users.push(newUser);
    await saveData();
    alert('Регистрация успешна! Теперь войдите.');
    showPage('login');
    return true;
}

function logout() {
    currentUserId = null;
    sessionStorage.removeItem('currentUserId');
    data.online = data.online.filter(o => o.userId !== currentUserId);
    saveData();
    updateUserInfo();
    showPage('login');
}

function updateUserInfo() {
    const u = getCurrentUser();
    const el = document.getElementById('userInfo');
    if (u) {
        const avatarHtml = u.avatar ? `<img src="${u.avatar}" class="avatar-mini" onclick="showPage('profile')">` : `<div class="avatar-mini" onclick="showPage('profile')">👤</div>`;
        el.innerHTML = `${avatarHtml} <b>${u.username}</b> <a onclick="logout()" style="color:#f44336;cursor:pointer;margin-left:8px;">Выйти</a>`;
    } else {
        el.innerHTML = `<a onclick="showPage('login')" style="color:#00d4ff;cursor:pointer;">Войти</a>`;
    }
}

// ================================================================
// ТОВАРЫ (CRUD) – упрощённо
// ================================================================
async function addProduct(product) {
    const user = getCurrentUser();
    if (!user) return false;
    const newProduct = {
        id: data.products.length ? Math.max(...data.products.map(p => p.id)) + 1 : 1,
        ...product,
        sellerId: user.id,
        status: 'approved',
        reviews: []
    };
    data.products.push(newProduct);
    await saveData();
    return newProduct;
}

async function editProduct(id, updates) {
    const idx = data.products.findIndex(p => p.id === id);
    if (idx === -1) return false;
    const prod = data.products[idx];
    const user = getCurrentUser();
    if (prod.sellerId !== user.id) return false;
    Object.assign(prod, updates);
    await saveData();
    return prod;
}

async function deleteProduct(id) {
    const idx = data.products.findIndex(p => p.id === id);
    if (idx === -1) return false;
    const prod = data.products[idx];
    const user = getCurrentUser();
    if (prod.sellerId !== user.id) return false;
    data.products.splice(idx, 1);
    await saveData();
    return true;
}

// ================================================================
// КОРЗИНА
// ================================================================
function getCart() { return JSON.parse(localStorage.getItem('cart')) || []; }
function saveCart(cart) { localStorage.setItem('cart', JSON.stringify(cart)); updateCartCount(); }
function updateCartCount() {
    const cart = getCart();
    const count = cart.reduce((s,i) => s + i.qty, 0);
    document.getElementById('cartCount').textContent = count;
}
function addToCart(id) {
    const prod = data.products.find(p => p.id === id);
    if (!prod || prod.status !== 'approved') { alert('Товар недоступен'); return; }
    const user = getCurrentUser();
    if (!user) { alert('Войдите'); showPage('login'); return; }
    if (user.id === prod.sellerId) { alert('Свой товар нельзя купить'); return; }
    const cart = getCart();
    const existing = cart.find(i => i.id === id);
    if (existing) existing.qty++;
    else cart.push({ id, qty: 1 });
    saveCart(cart);
    showPage('catalog');
}

// ================================================================
// ОСТАЛЬНЫЕ СТРАНИЦЫ (сокращённо)
// ================================================================
function showPage(page, param) {
    const content = document.getElementById('pageContent');
    content.classList.remove('fade-in');
    void content.offsetWidth;
    content.classList.add('fade-in');

    if (page === 'login') renderLogin();
    else if (page === 'catalog') renderCatalog();
    else if (page === 'cart') renderCart();
    else if (page === 'myOrders') renderMyOrders();
    else if (page === 'profile') renderProfile();
    else if (page === 'chats') renderChatsList();
    else if (page === 'chat' && param) renderChat(param);
    else if (page === 'globalChat') renderGlobalChat();
    else if (page === 'rules') renderRules();
    else if (page === 'game') {
        if (param === 'tictactoe') renderTicTacToe();
        else if (param === 'minesweeper') renderMinesweeper();
        else if (param === 'village') { ensureVillageState(); renderVillageBuilder(); }
        else if (param === 'paint') renderPaint();
        else if (param === 'runner') renderRunnerGame();
        else renderGameHub();
    }
    else if (page === 'ai') renderAI();
    else if (page === 'addProduct') renderAddProduct();
    else if (page === 'editProduct' && param) renderEditProduct(param);
    else if (page === 'product' && param) renderProduct(param);
    else if (page === 'orderForm') renderOrderForm();
    else content.innerHTML = '<p>Страница не найдена</p>';

    sessionStorage.setItem('currentPage', page);
    if (page === 'catalog') { searchQuery = ''; selectedGenre = 'all'; }
    // Очистка таймеров игр
    if (page !== 'game' || !param) {
        if (ticState.botTimeout) clearTimeout(ticState.botTimeout);
        if (mineState.timerInterval) clearInterval(mineState.timerInterval);
        if (runnerInterval) clearInterval(runnerInterval);
    }
    window.scrollTo({ top:0, behavior:'smooth' });
}

// ================================================================
// ЛОГИН
// ================================================================
function renderLogin() {
    if (getCurrentUser()) { showPage('catalog'); return; }
    document.getElementById('pageContent').innerHTML = `
        <h2 style="text-align:center;font-size:28px;margin-bottom:30px;">Добро пожаловать в TrueShop</h2>
        <div style="display:flex;gap:40px;flex-wrap:wrap;justify-content:center;margin-top:10px;">
            <div class="auth-block">
                <h3>🔐 Вход</h3>
                <form id="loginForm">
                    <div class="form-group" style="position:relative;"><label>Ник или Email</label><input type="text" id="loginUsername" required placeholder="Введите ник или email"><span class="input-icon" style="position:absolute;left:16px;top:44px;font-size:20px;color:#666;">👤</span></div>
                    <div class="form-group" style="position:relative;"><label>Пароль</label><input type="password" id="loginPass" required placeholder="••••••••"><span class="input-icon" style="position:absolute;left:16px;top:44px;font-size:20px;color:#666;">🔒</span></div>
                    <button type="submit" class="btn">Войти</button>
                </form>
                <div style="margin-top:16px;text-align:center;"><span class="reset-link" onclick="showResetPopup()">Забыли пароль?</span></div>
            </div>
            <div class="auth-block">
                <h3>📝 Регистрация</h3>
                <form id="registerForm">
                    <div class="form-group"><label>Ник</label><input type="text" id="regUsername" required placeholder="Уникальный ник"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="regEmail" required placeholder="example@mail.com"></div>
                    <div class="form-group"><label>Пароль</label><input type="password" id="regPass" required placeholder="••••••••"></div>
                    <div class="form-group"><label>Аватар</label><input type="file" id="regAvatar" accept="image/*"></div>
                    <button type="submit" class="btn btn-success">Зарегистрироваться</button>
                </form>
                <div class="register-image" style="margin-top:16px;"><img src="https://img.freepik.com/free-photo/adorable-looking-kittens_23-2150886306.jpg?semt=ais_hybrid" alt="Милые котята"></div>
            </div>
        </div>
    `;
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const login = document.getElementById('loginUsername').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        if (!login || !pass) { alert('Заполните все поля'); return; }
        await loadData();
        const success = await loginUser(login, pass);
        if (!success) alert('Неверный логин/email или пароль, или аккаунт забанен.');
    });
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPass').value.trim();
        if (!username || !email || !pass) { alert('Заполните все поля'); return; }
        await loadData();
        const fileInput = document.getElementById('regAvatar');
        const reader = new FileReader();
        reader.onload = async function(ev) {
            const avatar = ev.target.result || '';
            await registerUser(username, email, pass, avatar);
        };
        if (fileInput.files.length > 0) {
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            reader.onload(null);
        }
    });
}

function showResetPopup() {
    alert('Функция сброса пароля: свяжитесь с администратором (Admin / admin123).');
}

// ================================================================
// КАТАЛОГ
// ================================================================
function renderCatalog() {
    let html = `
        <div class="search-bar"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="Поиск..." oninput="filterProducts()" value="${searchQuery}"><button class="btn-search" onclick="filterProducts()">Найти</button></div>
        <div class="genre-chips" id="genreChips"><div class="genre-chip all active" data-genre="all" onclick="selectGenre('all')">Все</div>${GENRES.map(g=>`<div class="genre-chip ${g}" data-genre="${g}" onclick="selectGenre('${g}')">${GENRE_EMOJI[g]} ${g.charAt(0).toUpperCase()+g.slice(1)}</div>`).join('')}</div>
        <div id="catalogContent"><div class="section-header"><h2 id="sectionTitle">Все товары</h2><span class="count" id="sectionCount"></span></div><div id="productGrid" class="product-grid"></div></div>
    `;
    document.getElementById('pageContent').innerHTML = html;
    if (getCurrentUser()) {
        const addBtn = document.createElement('div');
        addBtn.style.marginTop = '20px';
        addBtn.innerHTML = `<button class="btn btn-success" onclick="showPage('addProduct')">➕ Добавить товар</button>`;
        document.getElementById('pageContent').appendChild(addBtn);
    }
    document.querySelectorAll('.genre-chip').forEach(chip => {
        if (chip.dataset.genre === selectedGenre) chip.classList.add('active');
        else chip.classList.remove('active');
    });
    filterProducts();
}

async function filterProducts() {
    const input = document.getElementById('searchInput');
    if (input) searchQuery = input.value.trim().toLowerCase();
    const grid = document.getElementById('productGrid');
    const title = document.getElementById('sectionTitle');
    const countSpan = document.getElementById('sectionCount');
    if (!grid) return;
    await loadData();
    let all = data.products.filter(p => p.status === 'approved' && !isBanned(p.sellerId));
    let filtered = all;
    if (searchQuery) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery));
    if (selectedGenre !== 'all') filtered = filtered.filter(p => p.genres && p.genres.includes(selectedGenre));
    if (title) title.textContent = (searchQuery || selectedGenre !== 'all') ? 'Результаты поиска' : 'Все товары';
    if (countSpan) countSpan.textContent = `${filtered.length} товар(а/ов)`;
    if (filtered.length === 0) { grid.innerHTML = `<div class="no-results">${(searchQuery || selectedGenre !== 'all') ? '🔍 Ничего не найдено' : 'Товаров пока нет'}</div>`; return; }
    let user = getCurrentUser();
    let html = '';
    filtered.forEach((p, index) => {
        const imgHtml = p.image ? `<img src="${p.image}" alt="${p.name}">` : '<div style="height:150px;background:#0a0a12;display:flex;align-items:center;justify-content:center;color:#555;border-radius:14px;">Нет фото</div>';
        const genresHtml = p.genres && p.genres.length ? `<div class="genres">${p.genres.map(g=>`<span class="genre-tag ${g}">${GENRE_EMOJI[g]||''} ${g}</span>`).join('')}</div>` : '';
        const isOwn = user && user.id === p.sellerId;
        const buttonHtml = isOwn ? `<span class="badge-own">Это ваш товар</span>` : `<button class="btn" onclick="event.stopPropagation(); addToCart(${p.id})">В корзину</button>`;
        html += `<div class="product-card" onclick="${isOwn ? 'event.stopPropagation();' : `showPage('product', ${p.id})`}" style="${isOwn ? 'cursor:default;' : 'cursor:pointer;'} animation: fadeIn 0.4s ease ${index * 0.05}s both;">
            ${imgHtml}<h3>${p.name}</h3><div class="price">${p.price} руб.</div><div class="meta">⭐ ${p.reviews ? p.reviews.length : 0} отзывов</div>${genresHtml}${buttonHtml}
        </div>`;
    });
    grid.innerHTML = html;
}

function selectGenre(genre) {
    selectedGenre = genre;
    document.querySelectorAll('.genre-chip').forEach(chip => {
        if (chip.dataset.genre === genre) chip.classList.add('active');
        else chip.classList.remove('active');
    });
    filterProducts();
}

// ================================================================
// КОРЗИНА
// ================================================================
function renderCart() {
    const cart = getCart();
    if (cart.length === 0) { document.getElementById('pageContent').innerHTML = '<h2>Корзина</h2><p>Корзина пуста.</p>'; return; }
    let html = '<h2>Корзина</h2><table class="cart-table"><tr><th>Товар</th><th>Цена</th><th>Кол-во</th><th>Сумма</th><th></th></tr>';
    let total = 0;
    cart.forEach(item => {
        const prod = data.products.find(p => p.id === item.id);
        if (!prod) return;
        const sum = prod.price * item.qty;
        total += sum;
        html += `<tr><td>${prod.name}</td><td>${prod.price}</td><td>${item.qty}</td><td>${sum}</td><td><button class="btn btn-danger" onclick="removeFromCart(${item.id})">Удалить</button></td></tr>`;
    });
    html += `</table><div class="total">Итого: ${total} руб.</div>
        <button class="btn btn-success" onclick="showPage('orderForm')">Оформить заказ</button>

async function createOrders(orderItems) {
    const user = getCurrentUser();
    if (!user) return false;
    const newOrders = orderItems.map(item => ({
        id: data.orders.length ? Math.max(...data.orders.map(o => o.id)) + 1 : 1,
        ...item,
        buyerId: user.id,
        buyerName: user.username,
        status: 'pending',
        created: new Date().toLocaleString(),
        messages: [{ senderId: 'system', text: 'Заказ создан.', timestamp: new Date().toLocaleString() }]
    }));
    data.orders.push(...newOrders);
    await saveData();
    return newOrders;
}

async function updateOrderStatus(orderId, status) {
    const order = data.orders.find(o => o.id === orderId);
    if (!order) return false;
    const user = getCurrentUser();
    if (order.buyerId !== user.id && order.sellerId !== user.id) return false;
    order.status = status;
    await saveData();
    return true;
}

async function addOrderMessage(orderId, text) {
    const order = data.orders.find(o => o.id === orderId);
    if (!order) return false;
    const user = getCurrentUser();
    if (order.buyerId !== user.id && order.sellerId !== user.id) return false;
    order.messages.push({ senderId: user.id, text, timestamp: new Date().toLocaleString() });
    await saveData();
    return true;
}

function renderOrderForm() {
    const cart = getCart();
    if (cart.length === 0) { alert('Корзина пуста'); showPage('cart'); return; }
    const user = getCurrentUser();
    if (!user) { alert('Войдите'); showPage('login'); return; }
    document.getElementById('pageContent').innerHTML = `
        <h2>Оформление заказа</h2>
        <form id="orderForm">
            <div class="form-group"><label>Имя</label><input type="text" id="orderName" value="${user.username}" required></div>
            <div class="form-group"><label>Телефон</label><input type="text" id="orderPhone"></div>
            <button type="submit" class="btn btn-success">Подтвердить</button>
            <button type="button" class="btn btn-secondary" onclick="showPage('cart')">Назад</button>
        </form>
    `;
    document.getElementById('orderForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const name = document.getElementById('orderName').value.trim() || 'Покупатель';
        const phone = document.getElementById('orderPhone').value.trim();
        const buyer = getCurrentUser();
        const cartItems = getCart();
        const orderItems = [];
        for (let item of cartItems) {
            const prod = data.products.find(p => p.id === item.id);
            if (!prod) continue;
            if (buyer.id === prod.sellerId) { alert(`Нельзя купить свой товар`); return; }
            orderItems.push({
                productId: prod.id,
                productName: prod.name,
                price: prod.price,
                qty: item.qty,
                total: prod.price * item.qty,
                buyerName: name,
                buyerPhone: phone,
                sellerId: prod.sellerId
            });
        }
        await loadData();
        await createOrders(orderItems);
        saveCart([]);
        updateCartCount();
        alert('Заказ оформлен!');
        showPage('myOrders');
    });
}

async function renderChat(orderId) {
    const user = getCurrentUser();
    if (!user) { showPage('login'); return; }
    await loadData();
    const order = data.orders.find(o => o.id === orderId);
    if (!order) { alert('Заказ не найден'); showPage('chats'); return; }
    if (order.buyerId !== user.id && order.sellerId !== user.id) {
        alert('Нет доступа'); showPage('chats'); return;
    }
    const otherUser = getUserById(order.buyerId === user.id ? order.sellerId : order.buyerId);
    const isBuyer = order.buyerId === user.id;
    const canConfirmSeller = !isBuyer && order.status === 'pending';
    const canConfirmBuyer = isBuyer && order.status === 'shipped';

    let html = `<h2>Чат по заказу #${order.id} (${order.productName})</h2>
        <div style="margin-bottom:10px;">Собеседник: ${otherUser ? otherUser.username : 'Неизвестен'}</div>
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">`;
    if (order.messages && order.messages.length > 0) {
        order.messages.forEach(msg => {
            const isSystem = msg.senderId === 'system';
            const isSelf = msg.senderId === user.id;
            const cls = isSystem ? 'system' : (isSelf ? 'self' : '');
            const senderName = isSystem ? 'Система' : (isSelf ? 'Вы' : (otherUser ? otherUser.username : 'Неизвестен'));
            html += `<div class="chat-message ${cls}">
                <span class="sender">${senderName}</span>
                <span class="time">${msg.timestamp || ''}</span>
                <div>${msg.text}</div>
            </div>`;
        });
    } else {
        html += `<div class="chat-message system">Сообщений пока нет.</div>`;
    }
    html += `</div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Введите сообщение...">
                <button class="btn" onclick="sendOrderMessage(${orderId})">Отправить</button>
            </div>
            <div style="margin-top:12px; display:flex; gap:12px; flex-wrap:wrap;">
                ${canConfirmSeller ? `<button class="btn btn-warning" onclick="updateOrderStatus(${orderId},'shipped')">✅ Подтвердить отправку</button>` : ''}
                ${canConfirmBuyer ? `<button class="btn btn-success" onclick="updateOrderStatus(${orderId},'completed')">✅ Подтвердить получение</button>` : ''}
                ${order.status === 'pending' ? `<button class="btn btn-danger" onclick="updateOrderStatus(${orderId},'cancelled')">Отменить</button>` : ''}
            </div>
            <div style="margin-top:12px;">
                <button class="btn btn-secondary" onclick="showPage('chats')">← Назад</button>
            </div>
        </div>`;
    document.getElementById('pageContent').innerHTML = html;
    const msgs = document.getElementById('chatMessages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
    if (window.chatInterval) clearInterval(window.chatInterval);
    window.chatInterval = setInterval(() => {
        if (document.getElementById('chatMessages')) {
            renderChat(orderId);
        } else {
            clearInterval(window.chatInterval);
        }
    }, 5000);
}

async function sendOrderMessage(orderId) {
    const input = document.getElementById('chatInput');
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;
    await loadData();
    await addOrderMessage(orderId, text);
    input.value = '';
    renderChat(orderId);
}

async function editProfile() {
    const user = getCurrentUser();
    if (!user) return;
    const newCard = prompt('Введите номер карты:', user.cardNumber || '');
    if (newCard !== null) {
        user.cardNumber = newCard.trim();
        await saveData();
        renderProfile();
    }
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = async function(ev) {
                user.avatar = ev.target.result;
                await saveData();
                renderProfile();
            };
            reader.readAsDataURL(file);
        }
    };
    input.click();
}

// ===== Игра Закладчик (полная) =====
let runnerState = { player: { x: 4, y: 4 }, drops: [], cops: [], score: 0, gameOver: false, level: 1, gridSize: 9, copSpeed: 1, dropTarget: 5, keys: {} };
let runnerInterval = null;

function renderRunnerGame() {
    resetRunnerGame();
    const html = `
        <div class="game-container" style="max-width:500px;">
            <h2>🏃 Закладчик</h2>
            <div class="game-stats">
                <span>📦 Закладки: <span id="runnerScore">${runnerState.score}</span></span>
                <span>🎯 Цель: <span id="runnerTarget">${runnerState.dropTarget}</span></span>
                <span>🚔 Полиция: <span id="runnerCops">${runnerState.cops.length}</span></span>
            </div>
            <div class="game-canvas-wrapper">
                <canvas id="runnerCanvas" width="400" height="400"></canvas>
            </div>
            <div style="margin-top:10px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
                <button class="btn btn-secondary" onclick="resetRunnerGame()">🔄 Новая игра</button>
                <button class="btn btn-secondary" onclick="showPage('game')">← Назад</button>
            </div>
            <div id="runnerMessage" style="margin-top:10px; font-weight:600; color:#f9a825;"></div>
        </div>
    `;
    document.getElementById('pageContent').innerHTML = html;
    const canvas = document.getElementById('runnerCanvas');
    const ctx = canvas.getContext('2d');
    document.addEventListener('keydown', (e) => {
        runnerState.keys[e.key] = true;
        if (e.key === ' ' || e.key === 'Space') {
            e.preventDefault();
            if (!runnerState.gameOver) dropPackage();
        }
    });
    document.addEventListener('keyup', (e) => { runnerState.keys[e.key] = false; });
    if (runnerInterval) clearInterval(runnerInterval);
    runnerInterval = setInterval(() => gameLoop(ctx), 200);
    drawCanvas(ctx);
}

function resetRunnerGame() {
    runnerState = {
        player: { x: 4, y: 4 },
        drops: [],
        cops: [],
        score: 0,
        gameOver: false,
        level: 1,
        gridSize: 9,
        copSpeed: 1,
        dropTarget: 5,
        keys: {}
    };
    for (let i = 0; i < 3; i++) {
        let pos;
        do {
            pos = { x: Math.floor(Math.random() * 9), y: Math.floor(Math.random() * 9) };
        } while (pos.x === runnerState.player.x && pos.y === runnerState.player.y);
        runnerState.drops.push({ x: pos.x, y: pos.y, active: true });
    }
    for (let i = 0; i < 2; i++) {
        let pos;
        do {
            pos = { x: Math.floor(Math.random() * 9), y: Math.floor(Math.random() * 9) };
        } while (pos.x === runnerState.player.x && pos.y === runnerState.player.y);
        runnerState.cops.push({ x: pos.x, y: pos.y });
    }
    const msg = document.getElementById('runnerMessage');
    if (msg) msg.textContent = 'Соберите все закладки и избегайте полиции!';
}

function dropPackage() {
    if (runnerState.gameOver) return;
    const idx = runnerState.drops.findIndex(d => d.x === runnerState.player.x && d.y === runnerState.player.y && d.active);
    if (idx !== -1) {
        runnerState.drops[idx].active = false;
        runnerState.score++;
        const target = document.getElementById('runnerTarget');
        if (target) target.textContent = runnerState.dropTarget;
        const score = document.getElementById('runnerScore');
        if (score) score.textContent = runnerState.score;
        if (runnerState.score >= runnerState.dropTarget) {
            runnerState.gameOver = true;
            const msg = document.getElementById('runnerMessage');
            if (msg) msg.textContent = '🎉 Победа!';
        }
        if (!runnerState.gameOver) {
            let pos;
            let attempts = 0;
            do {
                pos = { x: Math.floor(Math.random() * 9), y: Math.floor(Math.random() * 9) };
                attempts++;
            } while ((pos.x === runnerState.player.x && pos.y === runnerState.player.y) ||
                     runnerState.drops.some(d => d.x === pos.x && d.y === pos.y && d.active) &&
                     attempts < 50);
            runnerState.drops.push({ x: pos.x, y: pos.y, active: true });
        }
        if (runnerState.score % 3 === 0 && runnerState.cops.length < 5) {
            runnerState.cops.push({ x: Math.floor(Math.random() * 9), y: Math.floor(Math.random() * 9) });
            const copsSpan = document.getElementById('runnerCops');
            if (copsSpan) copsSpan.textContent = runnerState.cops.length;
        }
    } else {
        const msg = document.getElementById('runnerMessage');
        if (msg) msg.textContent = 'Здесь нет закладки!';
        setTimeout(() => { if (msg) msg.textContent = ''; }, 1000);
    }
}

function gameLoop(ctx) {
    if (runnerState.gameOver) return;
    const p = runnerState.player;
    let dx = 0, dy = 0;
    if (runnerState.keys['ArrowUp'] || runnerState.keys['w']) dy = -1;
    if (runnerState.keys['ArrowDown'] || runnerState.keys['s']) dy = 1;
    if (runnerState.keys['ArrowLeft'] || runnerState.keys['a']) dx = -1;
    if (runnerState.keys['ArrowRight'] || runnerState.keys['d']) dx = 1;
    if (dx !== 0 || dy !== 0) {
        const newX = p.x + dx;
        const newY = p.y + dy;
        if (newX >= 0 && newX < 9 && newY >= 0 && newY < 9) {
            p.x = newX;
            p.y = newY;
        }
    }
    runnerState.cops.forEach(cop => {
        if (Math.random() < 0.4) {
            const dx2 = Math.sign(runnerState.player.x - cop.x);
            const dy2 = Math.sign(runnerState.player.y - cop.y);
            if (Math.random() < 0.5) {
                if (cop.x + dx2 >= 0 && cop.x + dx2 < 9) cop.x += dx2;
            } else {
                if (cop.y + dy2 >= 0 && cop.y + dy2 < 9) cop.y += dy2;
            }
        } else {
            const dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
            const dir = dirs[Math.floor(Math.random() * dirs.length)];
            const nx = cop.x + dir.x;
            const ny = cop.y + dir.y;
            if (nx >= 0 && nx < 9 && ny >= 0 && ny < 9) {
                cop.x = nx;
                cop.y = ny;
            }
        }
    });
    const hit = runnerState.cops.some(c => c.x === p.x && c.y === p.y);
    if (hit) {
        runnerState.gameOver = true;
        const msg = document.getElementById('runnerMessage');
        if (msg) msg.textContent = '💀 Вас поймали!';
        if (runnerInterval) clearInterval(runnerInterval);
    }
    drawCanvas(ctx);
}

function drawCanvas(ctx) {
    const size = 400 / 9;
    ctx.clearRect(0, 0, 400, 400);
    for (let i = 0; i < 9; i++) {
        for (let j = 0; j < 9; j++) {
            ctx.fillStyle = (i + j) % 2 === 0 ? '#1a1a2a' : '#222244';
            ctx.fillRect(i * size, j * size, size, size);
            ctx.strokeStyle = '#2a2a3a';
            ctx.lineWidth = 1;
            ctx.strokeRect(i * size, j * size, size, size);
        }
    }
    runnerState.drops.filter(d => d.active).forEach(d => {
        ctx.fillStyle = '#4caf50';
        ctx.beginPath();
        ctx.arc(d.x * size + size/2, d.y * size + size/2, size * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('📦', d.x * size + size/2, d.y * size + size/2);
    });
    runnerState.cops.forEach(c => {
        ctx.fillStyle = '#d32f2f';
        ctx.beginPath();
        ctx.arc(c.x * size + size/2, c.y * size + size/2, size * 0.35, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '16px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🚔', c.x * size + size/2, c.y * size + size/2);
    });
    const p = runnerState.player;
    ctx.fillStyle = '#00d4ff';
    ctx.beginPath();
    ctx.arc(p.x * size + size/2, p.y * size + size/2, size * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '18px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🧑', p.x * size + size/2, p.y * size + size/2);
    ctx.fillStyle = '#888';
    ctx.font = '12px Arial';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText('Стрелки/WASD - движение, Space - взять закладку', 10, 395);
}

function renderAI() {
    document.getElementById('pageContent').innerHTML = `
        <div class="ai-container">
            <h2 style="text-align:center;font-size:28px;margin-bottom:20px;">🤖 AI Ассистент (демо)</h2>
            <div class="ai-chat" id="aiChat">
                <div class="msg system-msg">Задайте вопрос</div>
            </div>
            <div class="ai-input">
                <input type="text" id="aiInput" placeholder="Спросите что-нибудь..." onkeydown="if(event.key==='Enter') sendAIMessage()">
                <button class="btn" onclick="sendAIMessage()">Отправить</button>
            </div>
        </div>
    `;
}

function sendAIMessage() {
    const input = document.getElementById('aiInput');
    if (!input) return;
    const q = input.value.trim();
    if (!q) return;
    const chat = document.getElementById('aiChat');
    const userMsg = document.createElement('div');
    userMsg.className = 'msg user';
    userMsg.textContent = q;
    chat.appendChild(userMsg);
    input.value = '';
    chat.scrollTop = chat.scrollHeight;
    setTimeout(() => {
        const reply = document.createElement('div');
        reply.className = 'msg assistant';
        reply.textContent = getDemoResponse(q);
        chat.appendChild(reply);
        chat.scrollTop = chat.scrollHeight;
    }, 500);
}

function getDemoResponse(q) {
    const text = q.toLowerCase();
    if (text.includes('привет')) return 'Привет!';
    if (text.includes('как дела')) return 'Отлично!';
    if (text.includes('товар')) return 'Смотрите каталог.';
    if (text.includes('игра')) return 'Игры в разделе "Игры".';
    return 'Хороший вопрос! Попробуйте уточнить.';
}

function renderAddProduct() {
    const user = getCurrentUser();
    if (!user) { showPage('login'); return; }
    const sellerCard = user.cardNumber || '';
    document.getElementById('pageContent').innerHTML = `
        <h2>Продажа товара</h2>
        <div class="add-product-form">
            <form id="addProductForm" enctype="multipart/form-data">
                <div class="form-group"><label>Название</label><input type="text" id="prodName" required></div>
                <div class="form-group"><label>Цена</label><input type="number" id="prodPrice" required></div>
                <div class="form-group"><label>Описание</label><textarea id="prodDesc" rows="3"></textarea></div>
                <div class="form-group"><label>Изображение</label><input type="file" id="prodImage" accept="image/*"></div>
                <div class="form-group"><label>Номер карты</label><input type="text" id="prodCard" required value="${sellerCard}"></div>
                <div class="form-group"><label>Жанры (макс. 2)</label>
                    <div class="genre-checkboxes">${GENRES.map(g => `<label><input type="checkbox" class="genre-check" value="${g}"> ${GENRE_EMOJI[g]} ${g.charAt(0).toUpperCase()+g.slice(1)}</label>`).join('')}</div>
                </div>
                <button type="submit" class="btn btn-success">Опубликовать</button>
                <button type="button" class="btn btn-secondary" onclick="showPage('catalog')">Отмена</button>
            </form>
        </div>
    `;
    const checkboxes = document.querySelectorAll('.genre-check');
    checkboxes.forEach(cb => {
        cb.addEventListener('change', function() {
            const checked = document.querySelectorAll('.genre-check:checked');
            if (checked.length > 2) { this.checked = false; alert('Максимум 2 жанра'); }
        });
    });
    document.getElementById('addProductForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const name = document.getElementById('prodName').value.trim();
        const price = parseFloat(document.getElementById('prodPrice').value);
        const desc = document.getElementById('prodDesc').value.trim();
        const card = document.getElementById('prodCard').value.trim();
        const selectedGenres = Array.from(document.querySelectorAll('.genre-check:checked')).map(cb => cb.value);
        if (!name || isNaN(price)) { alert('Заполните название и цену'); return; }
        if (!card) { alert('Введите номер карты'); return; }
        if (selectedGenres.length === 0 || selectedGenres.length > 2) { alert('Выберите 1-2 жанра'); return; }
        const fileInput = document.getElementById('prodImage');
        const reader = new FileReader();
        reader.onload = async function(ev) {
            const image = ev.target.result || '';
            await loadData();
            await addProduct({ name, price, description: desc, image, cardNumber: card, genres: selectedGenres });
            alert('Товар опубликован');
            showPage('catalog');
        };
        if (fileInput.files.length > 0) reader.readAsDataURL(fileInput.files[0]);
        else reader.onload(null);
    });
}

}

function updateOnlineStatus() {
    const dot = document.getElementById('onlineDot');
    const txt = document.getElementById('onlineText');
    if (!dot) return;
    if (navigator.onLine) {
        dot.className = 'online-dot online';
        txt.textContent = 'Онлайн';
    } else {
        dot.className = 'online-dot offline';
        txt.textContent = 'Офлайн';
    }
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

// ================================================================
// ИНИЦИАЛИЗАЦИЯ
// ================================================================
document.addEventListener('DOMContentLoaded', async function() {
    await loadData();
    const savedId = sessionStorage.getItem('currentUserId');
    if (savedId) {
        const user = data.users.find(u => u.id === parseInt(savedId));
        if (user && !user.banned) {
            currentUserId = user.id;
        } else {
            sessionStorage.removeItem('currentUserId');
        }
    }
    updateUserInfo();
    updateCartCount();
    updateOnlineStatus();
    await updateOnlineList();
    if (getCurrentUser()) {
        showPage('catalog');
    } else {
        showPage('login');
    }
    ensureVillageState();
    if (!mineState.board.length) initMinesweeper();
});
