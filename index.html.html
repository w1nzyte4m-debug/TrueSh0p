<script>
// ================================================================
// НАСТРОЙКИ JSONBIN (ЗАМЕНИТЕ НА СВОИ)
// ================================================================
const BIN_ID = 'YOUR_BIN_ID';
const API_KEY = 'YOUR_API_KEY';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const HEADERS = { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY };

// ================================================================
// ДАННЫЕ
// ================================================================
let data = { users: [], products: [], orders: [], chat: [], online: [] };
let currentUserId = null;
const GENRES = ['услуги','порошки','рецепты','скрипты','оружие','вирусы'];
const GENRE_EMOJI = { услуги:'🛠', порошки:'🧪', рецепты:'📜', скрипты:'💻', оружие:'🔫', вирусы:'🦠' };
let searchQuery = '', selectedGenre = 'all';

// ================================================================
// РАБОТА С JSONBIN
// ================================================================
async function loadData() {
    try {
        const res = await fetch(BIN_URL, { headers: HEADERS });
        const json = await res.json();
        data = json.record || { users: [], products: [], orders: [], chat: [], online: [] };
        if (!data.users) data.users = [];
        if (!data.products) data.products = [];
        if (!data.orders) data.orders = [];
        if (!data.chat) data.chat = [];
        if (!data.online) data.online = [];
        // Тестовый пользователь
        if (data.users.length === 0) {
            data.users.push({ id: 1, username: 'Admin', email: 'admin@trueshop.com', password: 'admin123', avatar: '', cardNumber: '1234 5678 9012 3456', banned: false });
            await saveData();
        }
        // Инициализация онлайн-списка
        updateOnlineList();
    } catch (e) { console.error('loadData error', e); }
}

async function saveData() {
    try {
        await fetch(BIN_URL, { method: 'PUT', headers: HEADERS, body: JSON.stringify(data) });
    } catch (e) { console.error('saveData error', e); }
}

// ================================================================
// ОНЛАЙН-СЧЁТЧИК
// ================================================================
async function updateOnlineList() {
    const user = getCurrentUser();
    if (user) {
        // Обновляем или добавляем пользователя в онлайн
        const now = Date.now();
        const existing = data.online.find(o => o.userId === user.id);
        if (existing) {
            existing.lastSeen = now;
        } else {
            data.online.push({ userId: user.id, username: user.username, lastSeen: now });
        }
        // Удаляем записи старше 30 секунд
        data.online = data.online.filter(o => Date.now() - o.lastSeen < 30000);
        await saveData();
    }
    // Обновляем счётчик на странице
    const count = data.online.length;
    document.getElementById('onlineCount').textContent = count;
}

// Периодическое обновление онлайн-списка
setInterval(async () => {
    await loadData();
    await updateOnlineList();
}, 10000);

// При закрытии вкладки – не удаляем сразу (очистится через 30 сек)

// ================================================================
// ПОЛЬЗОВАТЕЛИ
// ================================================================
function getCurrentUser() { return data.users.find(u => u.id === currentUserId) || null; }
function getUserById(id) { return data.users.find(u => u.id === id) || null; }
function isBanned(id) { const u = getUserById(id); return u ? u.banned : false; }

async function loginUser(login, password) {
    const user = data.users.find(u =>
        (u.username.toLowerCase() === login.toLowerCase() || u.email.toLowerCase() === login.toLowerCase()) &&
        u.password === password && !u.banned
    );
    if (user) {
        currentUserId = user.id;
        sessionStorage.setItem('currentUserId', currentUserId);
        updateUserInfo();
        await updateOnlineList();
        showPage('catalog');
        return true;
    }
    return false;
}

async function registerUser(username, email, password, avatar) {
    if (data.users.some(u => u.username.toLowerCase() === username.toLowerCase())) {
        alert('Этот ник уже занят!'); return false;
    }
    if (data.users.some(u => u.email.toLowerCase() === email.toLowerCase())) {
        alert('Email уже зарегистрирован'); return false;
    }
    const newUser = {
        id: data.users.length ? Math.max(...data.users.map(u => u.id)) + 1 : 1,
        username, email, password, avatar: avatar || '', cardNumber: '', banned: false
    };
    data.users.push(newUser);
    await saveData();
    alert('Регистрация успешна! Теперь войдите.');
    showPage('login');
    return true;
}

function logout() {
    currentUserId = null;
    sessionStorage.removeItem('currentUserId');
    // Удаляем из онлайн-списка
    data.online = data.online.filter(o => o.userId !== currentUserId);
    saveData();
    updateUserInfo();
    showPage('login');
}

function updateUserInfo() {
    const u = getCurrentUser();
    const el = document.getElementById('userInfo');
    if (u) {
        const avatarHtml = u.avatar ? `<img src="${u.avatar}" class="avatar-mini" onclick="showPage('profile')">` : `<div class="avatar-mini" onclick="showPage('profile')">👤</div>`;
        el.innerHTML = `${avatarHtml} <b>${u.username}</b> <a onclick="logout()" style="color:#f44336;cursor:pointer;margin-left:8px;">Выйти</a>`;
    } else {
        el.innerHTML = `<a onclick="showPage('login')" style="color:#00d4ff;cursor:pointer;">Войти</a>`;
    }
}

// ================================================================
// ТОВАРЫ (CRUD)
// ================================================================
async function addProduct(product) {
    const user = getCurrentUser();
    if (!user) return false;
    const newProduct = {
        id: data.products.length ? Math.max(...data.products.map(p => p.id)) + 1 : 1,
        ...product,
        sellerId: user.id,
        status: 'approved',
        reviews: []
    };
    data.products.push(newProduct);
    await saveData();
    return newProduct;
}

async function editProduct(id, updates) {
    const idx = data.products.findIndex(p => p.id === id);
    if (idx === -1) return false;
    const prod = data.products[idx];
    const user = getCurrentUser();
    if (prod.sellerId !== user.id) return false;
    Object.assign(prod, updates);
    await saveData();
    return prod;
}

async function deleteProduct(id) {
    const idx = data.products.findIndex(p => p.id === id);
    if (idx === -1) return false;
    const prod = data.products[idx];
    const user = getCurrentUser();
    if (prod.sellerId !== user.id) return false;
    data.products.splice(idx, 1);
    await saveData();
    return true;
}

// ================================================================
// ЗАКАЗЫ
// ================================================================
async function createOrders(orderItems) {
    const user = getCurrentUser();
    if (!user) return false;
    const newOrders = orderItems.map(item => ({
        id: data.orders.length ? Math.max(...data.orders.map(o => o.id)) + 1 : 1,
        ...item,
        buyerId: user.id,
        buyerName: user.username,
        status: 'pending',
        created: new Date().toLocaleString(),
        messages: [{ senderId: 'system', text: 'Заказ создан. Ожидайте подтверждения.', timestamp: new Date().toLocaleString() }]
    }));
    data.orders.push(...newOrders);
    await saveData();
    return newOrders;
}

async function updateOrderStatus(orderId, status) {
    const order = data.orders.find(o => o.id === orderId);
    if (!order) return false;
    const user = getCurrentUser();
    if (order.buyerId !== user.id && order.sellerId !== user.id) return false;
    order.status = status;
    await saveData();
    return true;
}

async function addOrderMessage(orderId, text) {
    const order = data.orders.find(o => o.id === orderId);
    if (!order) return false;
    const user = getCurrentUser();
    if (order.buyerId !== user.id && order.sellerId !== user.id) return false;
    order.messages.push({ senderId: user.id, text, timestamp: new Date().toLocaleString() });
    await saveData();
    return true;
}

// ================================================================
// ОБЩИЙ ЧАТ
// ================================================================
async function sendGlobalMessage(text) {
    const user = getCurrentUser();
    if (!user) return false;
    const msg = { username: user.username, text, timestamp: new Date().toLocaleString(), system: false };
    data.chat.push(msg);
    await saveData();
    return true;
}

}

function showPage(page, param) {
    const content = document.getElementById('pageContent');
    content.classList.remove('fade-in');
    void content.offsetWidth;
    content.classList.add('fade-in');

    if (page === 'login') renderLogin();
    else if (page === 'catalog') renderCatalog();
    else if (page === 'cart') renderCart();
    else if (page === 'myOrders') renderMyOrders();
    else if (page === 'profile') renderProfile();
    else if (page === 'chats') renderChatsList();
    else if (page === 'chat' && param) renderChat(param);
    else if (page === 'globalChat') renderGlobalChat();
    else if (page === 'rules') renderRules();
    else if (page === 'game') {
        if (param === 'tictactoe') renderTicTacToe();
        else if (param === 'minesweeper') renderMinesweeper();
        else if (param === 'village') { ensureVillageState(); renderVillageBuilder(); }
        else if (param === 'paint') renderPaint();
        else renderGameHub();
    }
    else if (page === 'ai') renderAI();
    else if (page === 'addProduct') renderAddProduct();
    else if (page === 'editProduct' && param) renderEditProduct(param);
    else if (page === 'product' && param) renderProduct(param);
    else if (page === 'orderForm') renderOrderForm();
    else content.innerHTML = '<p>Страница не найдена</p>';

    sessionStorage.setItem('currentPage', page);
    if (page === 'catalog') { searchQuery = ''; selectedGenre = 'all'; }
    // Очистка таймеров игр
    if (page !== 'game' || !param) {
        if (ticState.botTimeout) clearTimeout(ticState.botTimeout);
        if (mineState.timerInterval) clearInterval(mineState.timerInterval);
    }
    window.scrollTo({ top:0, behavior:'smooth' });
}

async function filterProducts() {
    const input = document.getElementById('searchInput');
    if (input) searchQuery = input.value.trim().toLowerCase();
    const grid = document.getElementById('productGrid');
    const title = document.getElementById('sectionTitle');
    const countSpan = document.getElementById('sectionCount');
    if (!grid) return;
    await loadData();
    let all = data.products.filter(p => p.status === 'approved' && !isBanned(p.sellerId));
    let filtered = all;
    if (searchQuery) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery));
    if (selectedGenre !== 'all') filtered = filtered.filter(p => p.genres && p.genres.includes(selectedGenre));
    if (title) title.textContent = (searchQuery || selectedGenre !== 'all') ? 'Результаты поиска' : 'Все товары';
    if (countSpan) countSpan.textContent = `${filtered.length} товар(а/ов)`;
    if (filtered.length === 0) { grid.innerHTML = `<div class="no-results">${(searchQuery || selectedGenre !== 'all') ? '🔍 Ничего не найдено' : 'Товаров пока нет'}</div>`; return; }
    let user = getCurrentUser();
    let html = '';
    filtered.forEach((p, index) => {
        const imgHtml = p.image ? `<img src="${p.image}" alt="${p.name}">` : '<div style="height:150px;background:#0a0a12;display:flex;align-items:center;justify-content:center;color:#555;border-radius:14px;">Нет фото</div>';
        const genresHtml = p.genres && p.genres.length ? `<div class="genres">${p.genres.map(g=>`<span class="genre-tag ${g}">${GENRE_EMOJI[g]||''} ${g}</span>`).join('')}</div>` : '';
        const isOwn = user && user.id === p.sellerId;
        const buttonHtml = isOwn ? `<span class="badge-own">Это ваш товар</span>` : `<button class="btn" onclick="event.stopPropagation(); addToCart(${p.id})">В корзину</button>`;
        html += `<div class="product-card" onclick="${isOwn ? 'event.stopPropagation();' : `showPage('product', ${p.id})`}" style="${isOwn ? 'cursor:default;' : 'cursor:pointer;'} animation: fadeIn 0.4s ease ${index * 0.05}s both;">
            ${imgHtml}<h3>${p.name}</h3><div class="price">${p.price} руб.</div><div class="meta">⭐ ${p.reviews ? p.reviews.length : 0} отзывов</div>${genresHtml}${buttonHtml}
        </div>`;
    });
    grid.innerHTML = html;
}

function selectGenre(genre) {
    selectedGenre = genre;
    document.querySelectorAll('.genre-chip').forEach(chip => {
        if (chip.dataset.genre === genre) chip.classList.add('active');
        else chip.classList.remove('active');
    });
    filterProducts();
}

function addToCart(id) {
    const prod = data.products.find(p => p.id === id);
    if (!prod || prod.status !== 'approved') { alert('Товар недоступен'); return; }
    const user = getCurrentUser();
    if (!user) { alert('Войдите, чтобы добавить товар в корзину'); showPage('login'); return; }
    if (user.id === prod.sellerId) { alert('Вы не можете купить свой собственный товар.'); return; }
    const cart = getCart();
    const existing = cart.find(i => i.id === id);
    if (existing) existing.qty++;
    else cart.push({ id, qty: 1 });
    saveCart(cart);
    showPage('catalog');
}

function renderCart() {
    const cart = getCart();
    if (cart.length === 0) { document.getElementById('pageContent').innerHTML = '<h2>Корзина</h2><p>Корзина пуста.</p>'; return; }
    let html = '<h2>Корзина</h2><table class="cart-table"><tr><th>Товар</th><th>Цена</th><th>Кол-во</th><th>Сумма</th><th></th></tr>';
    let total = 0;
    cart.forEach(item => {
        const prod = data.products.find(p => p.id === item.id);
        if (!prod) return;
        const sum = prod.price * item.qty;
        total += sum;
        html += `<tr><td>${prod.name}</td><td>${prod.price}</td><td>${item.qty}</td><td>${sum}</td><td><button class="btn btn-danger" onclick="removeFromCart(${item.id})">Удалить</button></td></tr>`;
    });
    html += `</table><div class="total">Итого: ${total} руб.</div>
        <button class="btn btn-success" onclick="showPage('orderForm')">Оформить заказ</button>
        <button class="btn btn-danger" onclick="clearCart()">Очистить</button>`;
    document.getElementById('pageContent').innerHTML = html;
}

function removeFromCart(id) {
    let cart = getCart().filter(i => i.id !== id);
    saveCart(cart);
    renderCart();
}
function clearCart() { saveCart([]); renderCart(); }

function renderOrderForm() {
    const cart = getCart();

    const user = getCurrentUser();
    if (!user) { alert('Войдите, чтобы оформить заказ'); showPage('login'); return; }
    document.getElementById('pageContent').innerHTML = `
        <h2>Оформление заказа</h2>
        <form id="orderForm">
            <div class="form-group"><label>Ваше имя:</label><input type="text" id="orderName" value="${user.username}" required></div>

            <button type="button" class="btn btn-secondary" onclick="showPage('cart')">Назад</button>
        </form>
    `;
    document.getElementById('orderForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const name = document.getElementById('orderName').value.trim() || 'Покупатель';
        const phone = document.getElementById('orderPhone').value.trim();
        const buyer = getCurrentUser();
        const cartItems = getCart();
        const orderItems = [];

            const prod = data.products.find(p => p.id === item.id);

            if (buyer.id === prod.sellerId) { alert(`Вы не можете купить товар "${prod.name}", так как вы его продавец.`); return; }
            orderItems.push({
                productId: prod.id,
                productName: prod.name,
                price: prod.price,
                qty: item.qty,
                total: prod.price * item.qty,
                buyerName: name,
                buyerPhone: phone,
                sellerId: prod.sellerId
            });
        }
        await loadData();
        await createOrders(orderItems);
        saveCart([]);
        updateCartCount();
        alert('Заказ оформлен! Перейдите в чат для общения с продавцом.');
        showPage('myOrders');
    });
}

async function renderChat(orderId) {
    const user = getCurrentUser();
    if (!user) { showPage('login'); return; }
    await loadData();
    const order = data.orders.find(o => o.id === orderId);
    if (!order) { alert('Заказ не найден'); showPage('chats'); return; }
    if (order.buyerId !== user.id && order.sellerId !== user.id) {
        alert('У вас нет доступа к этому чату');
        showPage('chats'); return;
    }
    const otherUser = getUserById(order.buyerId === user.id ? order.sellerId : order.buyerId);
    const isBuyer = order.buyerId === user.id;
    const canConfirmSeller = !isBuyer && order.status === 'pending';
    const canConfirmBuyer = isBuyer && order.status === 'shipped';

    let html = `<h2>Чат по заказу #${order.id} (${order.productName})</h2>
        <div style="margin-bottom:10px;">Собеседник: ${otherUser ? otherUser.username : 'Неизвестен'}</div>
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">`;
    if (order.messages && order.messages.length > 0) {
        order.messages.forEach(msg => {
            const isSystem = msg.senderId === 'system';
            const isSelf = msg.senderId === user.id;
            const cls = isSystem ? 'system' : (isSelf ? 'self' : '');
            const senderName = isSystem ? 'Система' : (isSelf ? 'Вы' : (otherUser ? otherUser.username : 'Неизвестен'));
            html += `<div class="chat-message ${cls}">
                <span class="sender">${senderName}</span>
                <span class="time">${msg.timestamp || ''}</span>
                <div>${msg.text}</div>
            </div>`;
        });
    } else {
        html += `<div class="chat-message system">Сообщений пока нет.</div>`;
    }
    html += `</div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Введите сообщение...">
                <button class="btn" onclick="sendOrderMessage(${orderId})">Отправить</button>
            </div>
            <div style="margin-top:12px; display:flex; gap:12px; flex-wrap:wrap;">
                ${canConfirmSeller ? `<button class="btn btn-warning" onclick="updateOrderStatus(${orderId},'shipped')">✅ Подтвердить заказ (отправить)</button>` : ''}
                ${canConfirmBuyer ? `<button class="btn btn-success" onclick="updateOrderStatus(${orderId},'completed')">✅ Подтвердить получение</button>` : ''}
                ${order.status === 'pending' ? `<button class="btn btn-danger" onclick="updateOrderStatus(${orderId},'cancelled')">Отменить заказ</button>` : ''}
            </div>
            <div style="margin-top:12px;">
                <button class="btn btn-secondary" onclick="showPage('chats')">← Назад к чатам</button>
            </div>
        </div>`;
    document.getElementById('pageContent').innerHTML = html;
    const msgs = document.getElementById('chatMessages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
    if (window.chatInterval) clearInterval(window.chatInterval);
    window.chatInterval = setInterval(() => {
        if (document.getElementById('chatMessages')) {
            renderChat(orderId);
        } else {
            clearInterval(window.chatInterval);
        }
    }, 5000);
}

async function sendOrderMessage(orderId) {
    const input = document.getElementById('chatInput');
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;
    await loadData();
    await addOrderMessage(orderId, text);
    input.value = '';
    renderChat(orderId);
}

    await loadData();
    await updateOrderStatus(orderId, status);
    renderChat(orderId);
}

function renderTicTacToe() {
    if (ticState.gameOver) {
        ticState.board = ['','','','','','','','',''];
        ticState.currentPlayer = 'X';
        ticState.gameOver = false;
    }
    const html = `
        <div class="game-container">
            <h2>❌⭕ Крестики-нолики</h2>
            <div class="game-mode-selector">
                <button class="btn btn-secondary ${ticState.mode === 'friend' ? 'active' : ''}" onclick="setTicMode('friend')">👥 С другом</button>
                <button class="btn btn-secondary ${ticState.mode === 'bot' ? 'active' : ''}" onclick="setTicMode('bot')">🤖 С ботом</button>
            </div>
            <div class="game-status" id="ticStatus"></div>
            <div class="game-board" id="ticBoard"></div>
            <div class="game-score">
                <span class="x-score">X: <span id="ticScoreX">${ticState.score.X}</span></span>
                <span class="draw-score">Ничьи: <span id="ticScoreDraw">${ticState.score.draw}</span></span>
                <span class="o-score">O: <span id="ticScoreO">${ticState.score.O}</span></span>
            </div>
            <div class="game-actions">
                <button class="btn btn-secondary" onclick="resetTicGame()">🔄 Новая игра</button>
                <button class="btn btn-danger" onclick="resetTicScore()">🗑️ Сбросить счёт</button>
                <button class="btn btn-secondary" onclick="showPage('game')">← Назад</button>
            </div>
        </div>
    `;
    document.getElementById('pageContent').innerHTML = html;
    renderTicBoard();
    if (ticState.mode === 'bot' && ticState.currentPlayer === 'O' && !ticState.gameOver) {
        if (ticState.botTimeout) clearTimeout(ticState.botTimeout);
        ticState.botTimeout = setTimeout(() => ticBotMove(), 300);
    }
}

function setTicMode(mode) { ticState.mode = mode; resetTicGame(); }

function renderTicBoard() {
    const boardEl = document.getElementById('ticBoard');
    if (!boardEl) return;
    boardEl.innerHTML = '';
    ticState.board.forEach((cell, index) => {
        const cellDiv = document.createElement('div');
        cellDiv.className = `game-cell ${cell ? 'taken ' + cell.toLowerCase() : ''}`;
        cellDiv.textContent = cell;
        cellDiv.dataset.index = index;
        if (!cell && !ticState.gameOver) {
            cellDiv.addEventListener('click', () => ticHandleClick(index));
        }
        boardEl.appendChild(cellDiv);
    });
    const statusEl = document.getElementById('ticStatus');
    if (statusEl) {
        if (ticState.gameOver) {
            const winner = ticCheckWinner();
            if (winner === 'X') statusEl.innerHTML = '🏆 Победил <span style="color:#00d4ff;">X</span>!';
            else if (winner === 'O') statusEl.innerHTML = '🏆 Победил <span style="color:#f5576c;">O</span>!';
            else if (ticState.board.every(c => c !== '')) statusEl.innerHTML = '🤝 Ничья!';
            else statusEl.innerHTML = 'Игра завершена.';
        } else {
            statusEl.innerHTML = `Ход: <span style="color:#00d4ff;">${ticState.currentPlayer}</span>`;
        }
    }
    document.getElementById('ticScoreX').textContent = ticState.score.X;
    document.getElementById('ticScoreO').textContent = ticState.score.O;
    document.getElementById('ticScoreDraw').textContent = ticState.score.draw;
}

function ticHandleClick(index) {
    if (ticState.gameOver) return;
    if (ticState.mode === 'bot' && ticState.currentPlayer === 'O') return;
    if (ticState.board[index] !== '') return;
    ticMakeMove(index);
}

function ticMakeMove(index) {
    ticState.board[index] = ticState.currentPlayer;
    renderTicBoard();
    const winner = ticCheckWinner();
    if (winner) {
        ticState.gameOver = true;
        ticState.score[winner]++;
        renderTicBoard();
        return;
    } else if (ticState.board.every(c => c !== '')) {
        ticState.gameOver = true;
        ticState.score.draw++;
        renderTicBoard();
        return;
    }
    ticState.currentPlayer = (ticState.currentPlayer === 'X' ? 'O' : 'X');
    renderTicBoard();
    if (ticState.mode === 'bot' && ticState.currentPlayer === 'O' && !ticState.gameOver) {
        if (ticState.botTimeout) clearTimeout(ticState.botTimeout);
        ticState.botTimeout = setTimeout(() => ticBotMove(), 300);
    }
}

function ticBotMove() {
    if (ticState.gameOver) return;
    if (ticState.currentPlayer !== 'O') return;
    const empty = ticState.board.reduce((acc, cell, idx) => {
        if (cell === '') acc.push(idx);
        return acc;
    }, []);
    if (empty.length === 0) return;
    const randomIndex = empty[Math.floor(Math.random() * empty.length)];
    ticMakeMove(randomIndex);
    ticState.botTimeout = null;
}

function ticCheckWinner() {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (let line of lines) {
        const [a,b,c] = line;
        if (ticState.board[a] && ticState.board[a] === ticState.board[b] && ticState.board[a] === ticState.board[c]) {
            return ticState.board[a];
        }
    }
    return null;
}

function resetTicGame() {
    ticState.board = ['','','','','','','','',''];
    ticState.currentPlayer = 'X';
    ticState.gameOver = false;
    if (ticState.botTimeout) { clearTimeout(ticState.botTimeout); ticState.botTimeout = null; }
    renderTicBoard();
    if (ticState.mode === 'bot' && ticState.currentPlayer === 'O' && !ticState.gameOver) {
        if (ticState.botTimeout) clearTimeout(ticState.botTimeout);
        ticState.botTimeout = setTimeout(() => ticBotMove(), 300);
    }
}
function resetTicScore() {
    ticState.score = { X: 0, O: 0, draw: 0 };
    resetTicGame();
}

function initMinesweeper() {
    const rows = mineState.rows, cols = mineState.cols, mines = mineState.mines;
    mineState.board = Array.from({ length: rows }, () => Array(cols).fill(0));
    mineState.revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
    mineState.flagged = Array.from({ length: rows }, () => Array(cols).fill(false));
    mineState.gameOver = false;
    mineState.firstClick = true;
    mineState.timer = 0;
    if (mineState.timerInterval) clearInterval(mineState.timerInterval);
    mineState.timerInterval = null;
    renderMinesweeper();
}

function placeMines(excludeRow, excludeCol) {
    const rows = mineState.rows, cols = mineState.cols, mines = mineState.mines;
    let placed = 0;
    while (placed < mines) {
        const r = Math.floor(Math.random() * rows);
        const c = Math.floor(Math.random() * cols);
        if ((r === excludeRow && c === excludeCol) || mineState.board[r][c] === -1) continue;
        mineState.board[r][c] = -1;
        placed++;
    }
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (mineState.board[r][c] === -1) continue;
            let count = 0;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    const nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && mineState.board[nr][nc] === -1) count++;
                }
            }
            mineState.board[r][c] = count;
        }
    }
}

function renderMinesweeper() {
    const rows = mineState.rows, cols = mineState.cols;
    let boardHtml = `
        <div class="minesweeper-container">
            <div class="minesweeper-header">
                <span>💣 ${mineState.mines}</span>
                <span>⏱️ ${mineState.timer}</span>
                <div>
                    <button class="btn btn-secondary" onclick="toggleMineFlagMode()" style="padding:4px 12px;font-size:13px;">
                        ${mineState.flagMode ? '🚩 Режим флага' : '🟦 Режим открытия'}
                    </button>
                </div>
            </div>
            <div class="minesweeper-board" style="grid-template-columns: repeat(${cols}, 1fr); max-width: ${Math.min(400, cols*40)}px;">
    `;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const cell = mineState.board[r][c];
            const revealed = mineState.revealed[r][c];
            const flagged = mineState.flagged[r][c];
            let content = '';
            let classes = 'minesweeper-cell';
            if (revealed) {
                classes += ' revealed';
                if (cell === -1) content = '💣';
                else if (cell > 0) content = cell;
                else content = '';
                if (mineState.gameOver && cell === -1 && !mineState.flagged[r][c]) classes += ' mine-exploded';
            } else if (flagged) {
                classes += ' flagged';
                content = '🚩';
            }
            boardHtml += `<div class="${classes}" data-r="${r}" data-c="${c}" data-value="${cell}" onclick="mineCellClick(${r},${c})" oncontextmenu="mineRightClick(event,${r},${c})">${content}</div>`;
        }
    }
    boardHtml += `
            </div>
            <div style="margin-top:15px;">
                <button class="btn btn-secondary" onclick="initMinesweeper()">🔄 Новая игра</button>
                <button class="btn btn-secondary" onclick="showPage('game')">← Назад</button>
            </div>
            ${mineState.gameOver ? `<div style="margin-top:10px;font-size:20px;font-weight:600;color:#f44336;">${mineState.gameOver === 'win' ? '🎉 Победа!' : '💥 Поражение!'}</div>` : ''}
        </div>
    `;
    document.getElementById('pageContent').innerHTML = boardHtml;
}

function toggleMineFlagMode() {
    mineState.flagMode = !mineState.flagMode;
    renderMinesweeper();
}

function mineCellClick(row, col) {
    if (mineState.gameOver) return;
    if (mineState.flagged[row][col]) return;
    if (mineState.revealed[row][col]) return;
    if (mineState.firstClick) {
        placeMines(row, col);
        mineState.firstClick = false;
        mineState.timerInterval = setInterval(() => {
            mineState.timer++;
            document.querySelector('.minesweeper-header span:nth-child(2)').textContent = '⏱️ ' + mineState.timer;
        }, 1000);
    }
    if (mineState.flagMode) {
        mineState.flagged[row][col] = !mineState.flagged[row][col];
        renderMinesweeper();
        return;
    }
    revealCell(row, col);
    renderMinesweeper();
    checkWin();
}

function mineRightClick(e, row, col) {
    e.preventDefault();
    if (mineState.gameOver) return;
    if (mineState.revealed[row][col]) return;
    mineState.flagged[row][col] = !mineState.flagged[row][col];
    renderMinesweeper();
}

function revealCell(row, col) {
    if (row < 0 || row >= mineState.rows || col < 0 || col >= mineState.cols) return;
    if (mineState.revealed[row][col]) return;
    if (mineState.flagged[row][col]) return;
    if (mineState.board[row][col] === -1) {
        mineState.gameOver = 'lose';
        if (mineState.timerInterval) clearInterval(mineState.timerInterval);
        mineState.timerInterval = null;
        return;
    }
    mineState.revealed[row][col] = true;
    if (mineState.board[row][col] === 0) {
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dc === 0) continue;
                revealCell(row + dr, col + dc);
            }
        }
    }
}

function checkWin() {
    let allRevealed = true;
    for (let r = 0; r < mineState.rows; r++) {
        for (let c = 0; c < mineState.cols; c++) {
            if (mineState.board[r][c] !== -1 && !mineState.revealed[r][c]) {
                allRevealed = false;
                break;
            }
        }
        if (!allRevealed) break;
    }
    if (allRevealed) {
        mineState.gameOver = 'win';
        if (mineState.timerInterval) clearInterval(mineState.timerInterval);
        mineState.timerInterval = null;
        renderMinesweeper();
    }
}

                <h3>🏗️ Здания</h3>
                ${Object.keys(BUILDING_TEMPLATES).map(key => {
                    const template = BUILDING_TEMPLATES[key];
                    const count = buildings[key] ? buildings[key].count : 0;
                    const costHtml = Object.entries(template.cost).map(([res, val]) => `${RESOURCE_EMOJI[res]}${val}`).join(' ');
                    return `<div class="building-item">
                        <div class="info"><strong>${template.emoji} ${template.name}</strong> (${count})<br><span style="font-size:12px;color:#888;">Стоимость: ${costHtml}</span></div>

        </div>
    `;

    if (!window.villageInterval) {
        window.villageInterval = setInterval(() => {
            const b = villageState.buildings;
            const r = villageState.resources;
            r.wood += (b.lumbermill ? b.lumbermill.count * 2 : 0);
            r.stone += (b.quarry ? b.quarry.count * 2 : 0) + (b.mine ? b.mine.count * 1 : 0);
            r.food += (b.farm ? b.farm.count * 2 : 0) + (b.temple ? b.temple.count * 1 : 0);
            r.gold += (b.market ? b.market.count * 2 : 0) + (b.mine ? b.mine.count * 1 : 0) + (b.tavern ? b.tavern.count * 3 : 0) + (b.temple ? b.temple.count * 1 : 0) + (b.bank ? b.bank.count * 4 : 0);
            r.iron += (b.mine ? b.mine.count * 2 : 0) + (b.forge ? b.forge.count * 3 : 0);
            r.crystal += (b.laboratory ? b.laboratory.count * 1 : 0) + (b.alchemy ? b.alchemy.count * 2 : 0);

                const total = ACHIEVEMENTS.length;
                const unlocked = ACHIEVEMENTS.filter(a => villageState.achievements.includes(a.id)).length;
                achCount.textContent = `🏆 Достижения (${unlocked}/${total})`;
            }
        }, 2000);
    }
}

function buildBuilding(type) {
    const template = BUILDING_TEMPLATES[type];
    if (!template) return;
    const cost = template.cost;
    const r = villageState.resources;
    for (let [key, val] of Object.entries(cost)) {
        if ((r[key] || 0) < val) {
            alert(`Не хватает ${RESOURCE_NAMES[key]} (нужно ${val})`);
            return;
        }
    }
    for (let [key, val] of Object.entries(cost)) {
        r[key] -= val;
    }
    if (!villageState.buildings[type]) villageState.buildings[type] = { count: 0 };
    villageState.buildings[type].count++;
    villageState.totalBuilds++;
    if (type === 'house') {
        villageState.maxPopulation += 2;
        villageState.population++;
    }
    ACHIEVEMENTS.forEach(a => {
        if (!villageState.achievements.includes(a.id) && a.check(villageState)) {
            villageState.achievements.push(a.id);
        }
    });
    saveVillage();
    renderVillageBuilder();
}

function resetVillage() {
    if (!confirm('Сбросить прогресс деревни?')) return;
    villageState = {
        resources: { wood: 50, stone: 30, food: 25, gold: 10, iron: 5, crystal: 3, mana: 2 },
        buildings: Object.keys(BUILDING_TEMPLATES).reduce((a, k) => {
            a[k] = { count: k === 'house' ? 1 : 0 };
            return a;
        }, {}),
        population: 1,
        maxPopulation: 2,
        totalBuilds: 1,
        achievements: [],
        lastTick: Date.now()
    };
    saveVillage();
    if (window.villageInterval) {
        clearInterval(window.villageInterval);
        window.villageInterval = null;
    }
    renderVillageBuilder();
}

let paintCanvas, paintCtx, painting = false, paintColor = '#000000', paintBrushSize = 5;

function renderPaint() {
    const html = `
        <div class="paint-container">
            <h2>🎨 Paint – нарисуйте что-нибудь</h2>
            <div class="paint-canvas-wrapper">
                <canvas id="paintCanvas" width="400" height="400"></canvas>
            </div>
            <div class="paint-tools">
                <button class="active" data-color="#000000" onclick="setPaintColor('#000000', this)">⚫ Чёрный</button>
                <button data-color="#ff0000" onclick="setPaintColor('#ff0000', this)">🔴 Красный</button>
                <button data-color="#0000ff" onclick="setPaintColor('#0000ff', this)">🔵 Синий</button>
                <button data-color="#00ff00" onclick="setPaintColor('#00ff00', this)">🟢 Зелёный</button>
                <button data-color="#ffff00" onclick="setPaintColor('#ffff00', this)">🟡 Жёлтый</button>
                <button data-color="#ff00ff" onclick="setPaintColor('#ff00ff', this)">🟣 Фиолетовый</button>
                <button onclick="clearPaint()">🗑️ Очистить</button>
                <button onclick="guessPaint()">🤖 Угадать!</button>
            </div>
            <div class="paint-guess"><div id="paintResult">Нажмите "Угадать", чтобы AI попытался угадать рисунок</div></div>
            <div style="margin-top:15px;"><button class="btn btn-secondary" onclick="showPage('game')">← Назад</button></div>
        </div>
    `;
    document.getElementById('pageContent').innerHTML = html;
    paintCanvas = document.getElementById('paintCanvas');
    paintCtx = paintCanvas.getContext('2d');
    paintCtx.fillStyle = 'white';
    paintCtx.fillRect(0, 0, 400, 400);
    paintCanvas.addEventListener('mousedown', startPaint);
    paintCanvas.addEventListener('mousemove', drawPaint);
    paintCanvas.addEventListener('mouseup', endPaint);
    paintCanvas.addEventListener('mouseleave', endPaint);
    paintCanvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const rect = paintCanvas.getBoundingClientRect();
        const x = (t.clientX - rect.left) * (400 / rect.width);
        const y = (t.clientY - rect.top) * (400 / rect.height);
        startPaint({ clientX: x, clientY: y });
    });
    paintCanvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const rect = paintCanvas.getBoundingClientRect();
        const x = (t.clientX - rect.left) * (400 / rect.width);
        const y = (t.clientY - rect.top) * (400 / rect.height);
        drawPaint({ clientX: x, clientY: y });
    });
    paintCanvas.addEventListener('touchend', endPaint);
    document.querySelector('.paint-tools .active')?.classList.add('active');
}

function setPaintColor(color, btn) {
    paintColor = color;
    document.querySelectorAll('.paint-tools button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function clearPaint() {
    paintCtx.fillStyle = 'white';
    paintCtx.fillRect(0, 0, 400, 400);
    document.getElementById('paintResult').innerHTML = 'Холст очищен. Нажмите "Угадать", чтобы AI попытался угадать.';
}

function startPaint(e) {
    painting = true;
    const rect = paintCanvas.getBoundingClientRect();
    const x = e.clientX ? (e.clientX - rect.left) * (400 / rect.width) : e.clientX;
    const y = e.clientY ? (e.clientY - rect.top) * (400 / rect.height) : e.clientY;
    paintCtx.beginPath();
    paintCtx.arc(x, y, paintBrushSize / 2, 0, Math.PI * 2);
    paintCtx.fillStyle = paintColor;
    paintCtx.fill();
}

function drawPaint(e) {
    if (!painting) return;
    const rect = paintCanvas.getBoundingClientRect();
    const x = e.clientX ? (e.clientX - rect.left) * (400 / rect.width) : e.clientX;
    const y = e.clientY ? (e.clientY - rect.top) * (400 / rect.height) : e.clientY;
    paintCtx.fillStyle = paintColor;
    paintCtx.beginPath();
    paintCtx.arc(x, y, paintBrushSize / 2, 0, Math.PI * 2);
    paintCtx.fill();
}

function endPaint() { painting = false; }

async function guessPaint() {
    const resultDiv = document.getElementById('paintResult');
    resultDiv.innerHTML = '⏳ AI думает...';
    const imageData = paintCanvas.toDataURL('image/png');
    try {
        const response = await fetch('https://api-inference.huggingface.co/models/google/vit-base-patch16-224', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ inputs: imageData.split(',')[1] })
        });
        if (!response.ok) throw new Error('API ошибка: ' + response.status);
        const data = await response.json();
        if (data && data[0] && data[0].label) {
            resultDiv.innerHTML = `🎨 AI думает, что это: <span class="result">${data[0].label}</span> (вероятность: ${(data[0].score * 100).toFixed(1)}%)`;

        const randomWord = words[Math.floor(Math.random() * words.length)];
        resultDiv.innerHTML = `🎨 (Демо) AI предполагает, что это: <span class="result">${randomWord}</span> (в реальном режиме нужен доступ к API)`;

function renderAI() {

function sendAIMessage() {
    const input = document.getElementById('aiInput');
    if (!input) return;
    const q = input.value.trim();
    if (!q) return;
    const chat = document.getElementById('aiChat');
    const userMsg = document.createElement('div');
    userMsg.className = 'msg user';
    userMsg.textContent = q;
    chat.appendChild(userMsg);
    input.value = '';
    chat.scrollTop = chat.scrollHeight;
    setTimeout(() => {
        const reply = document.createElement('div');
        reply.className = 'msg assistant';
        reply.textContent = getDemoResponse(q);
        chat.appendChild(reply);
        chat.scrollTop = chat.scrollHeight;
    }, 500);
}

function getDemoResponse(q) {
    const text = q.toLowerCase();
    if (text.includes('привет') || text.includes('здравствуй')) return 'Привет! Чем могу помочь?';
    if (text.includes('как дела')) return 'У меня всё отлично, спасибо!';
    if (text.includes('погода')) return 'Я пока не умею определять погоду, но в TrueShop всегда солнечно!';
    if (text.includes('товар') || text.includes('купить')) return 'В TrueShop вы можете найти много интересных товаров. Перейдите в каталог!';
    if (text.includes('игра') || text.includes('поиграть')) return 'В разделе "Игры" вас ждут крестики-нолики, сапёр, стратегия и Paint!';
    if (text.includes('спасибо')) return 'Всегда рад помочь! Обращайтесь ещё.';
    if (text.includes('кто ты')) return 'Я – ваш AI-ассистент TrueShop. Работаю в демо-режиме.';
    return 'Интересный вопрос! Я ещё учусь, но могу сказать, что в TrueShop много полезного. Попробуйте уточнить вопрос.';
}

    const checkboxes = document.querySelectorAll('.genre-check');
    checkboxes.forEach(cb => {

            if (checked.length > 2) { this.checked = false; alert('Можно выбрать не более 2 жанров.'); }
        });
    });

function updateOnlineStatus() {
    const dot = document.getElementById('onlineDot');
    const txt = document.getElementById('onlineText');
    if (!dot) return;
    if (navigator.onLine) {
        dot.className = 'online-dot online';
        txt.textContent = 'Онлайн';
    } else {
        dot.className = 'online-dot offline';
        txt.textContent = 'Офлайн';
    }
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
